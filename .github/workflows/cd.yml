name: CD - Promoción y Despliegue de Modelo

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI - Entrenamiento y Validación de Modelo"]
    types:
      - completed

jobs:
  deploy-model:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install mlflow

      - name: Descargar artefactos del CI
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Verificar artefactos descargados
        run: |
          echo "Contenido de mlruns:"
          ls -R mlruns

      - name: Promoción de modelo (simulada)
        run: |
          echo "✅ Modelo validado promovido a producción"
          echo "🚀 Simulación de despliegue completada"
